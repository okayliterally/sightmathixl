<!DOCTYPE html>
<html lang="en">
<head>
<base href="https://cdn.jsdelivr.net/gh/gn-math/gn-math-DONTDMCA@main/">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games 3</title>
<meta name="title" content="Games 3">
<meta name="description" content="Play unbl*cked games like Crazy Cattle 3D and DriveMad on Games 3. Fast, free, no downloads—perfect for school or home.">
<meta name="theme-color" content="#9333ea">
<style>
:root{--primary:#9333ea;--primary-hover:#7e22ce;--primary-light:rgba(147,51,234,0.1);--accent:#a855f7;--accent-light:rgba(168,85,247,0.1);--success:#10b981;--warning:#f59e0b;--text:#1a1a1a;--text-muted:#6b7280;--text-light:#9ca3af;--bg:#fff;--bg-secondary:#f8fafc;--surface:#fff;--surface-hover:#f1f5f9;--border:#e2e8f0;--border-light:#f1f5f9;--glass:rgba(255,255,255,0.8);--shadow-xs:0 1px 2px 0 rgb(0 0 0/.05);--shadow-sm:0 1px 3px 0 rgb(0 0 0/.1),0 1px 2px -1px rgb(0 0 0/.1);--shadow:0 4px 6px -1px rgb(0 0 0/.1),0 2px 4px -2px rgb(0 0 0/.1);--shadow-lg:0 10px 15px -3px rgb(0 0 0/.1),0 4px 6px -4px rgb(0 0 0/.1);--shadow-xl:0 20px 25px -5px rgb(0 0 0/.1),0 8px 10px -6px rgb(0 0 0/.1);--radius:12px;--radius-sm:8px;--radius-lg:16px;--gradient-primary:linear-gradient(135deg,#9333ea 0%,#7e22ce 100%);--gradient-surface:linear-gradient(135deg,#fff 0%,#f8fafc 100%)}
.dark-mode{--primary:#a855f7;--primary-hover:#c084fc;--primary-light:rgba(168,85,247,0.15);--accent:#c084fc;--success:#34d399;--warning:#fbbf24;--text:#f1f5f9;--text-muted:#94a3b8;--text-light:#64748b;--bg:#0a0a0a;--bg-secondary:#111;--surface:#151515;--surface-hover:#1e1e1e;--border:#222;--border-light:#2a2a2a;--glass:rgba(15,15,15,0.8);--shadow-sm:0 1px 3px 0 rgb(0 0 0/.6),0 1px 2px -1px rgb(0 0 0/.6);--shadow:0 4px 6px -1px rgb(0 0 0/.6),0 2px 4px -2px rgb(0 0 0/.6);--shadow-lg:0 10px 15px -3px rgb(0 0 0/.7),0 4px 6px -4px rgb(0 0 0/.7);--shadow-xl:0 20px 25px -5px rgb(0 0 0/.8),0 8px 10px -6px rgb(0 0 0/.8);--gradient-primary:linear-gradient(135deg,#9333ea 0%,#7e22ce 50%,#581c87 100%);--gradient-surface:linear-gradient(135deg,#151515 0%,#1e1e1e 100%)}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;line-height:1.6;margin:0;padding:0;background:var(--bg);color:var(--text);transition:all .3s cubic-bezier(.4,0,.2,1);font-weight:400;-webkit-font-smoothing:antialiased}

/* search bar area */
.search-bar-area{background:var(--gradient-primary);padding:0.75rem 1rem;display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;max-width:1200px;margin:0 auto}
.search-bar-area input,.search-bar-area select{flex:1;min-width:120px;padding:0.6rem 0.8rem;border:0;border-radius:var(--radius-sm);background:var(--glass);backdrop-filter:blur(20px);color:var(--text);font-size:14px;outline:none;transition:all .3s ease;font-family:inherit}
.search-bar-area input:focus{box-shadow:0 0 0 3px rgba(168,85,247,0.25),var(--shadow)}
.search-bar-area .refresh-btn{background:rgba(255,255,255,0.1);border:0;color:#fff;cursor:pointer;padding:0 12px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s ease}
.search-bar-area .refresh-btn:hover{background:rgba(255,255,255,0.2)}

main{padding:1.5rem 1rem 4rem}
#container,#featuredZones{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1.5rem}
.zone-item{background:var(--gradient-surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;position:relative;box-shadow:var(--shadow-sm)}
.zone-item:hover{transform:translateY(-8px) scale(1.02);box-shadow:var(--shadow-xl);border-color:var(--primary)}
.zone-item::before{content:'';position:absolute;inset:0;background:var(--primary-light);opacity:0;transition:opacity .4s ease;pointer-events:none;z-index:1}
.zone-item:hover::before{opacity:1}
.zone-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--border-light);transition:transform .4s cubic-bezier(.4,0,.2,1)}
.zone-item:hover img{transform:scale(1.05)}
.zone-item button{background:transparent;color:var(--text);border:0;padding:1.25rem 1rem;cursor:pointer;font-weight:600;font-size:14px;line-height:1.4;text-align:center;transition:all .3s ease;min-height:70px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;font-family:inherit}
.zone-item:hover button{color:var(--primary);background:rgba(168,85,247,0.05)}

#zoneViewer{position:fixed;inset:0;background:var(--bg);z-index:1000;display:none;flex-direction:column;animation:slideInUp .3s ease}
@keyframes slideInUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.zone-header{background:var(--gradient-primary);color:#fff;padding:0.3rem 1.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-lg)}
.zone-title{flex:1;min-width:0}
#zoneName{font-size:1.25rem;font-weight:700;margin:0 0 .25rem;line-height:1.3}
#zoneId{display:none}
#zoneAuthor{font-size:14px;color:rgba(255,255,255,.8);text-decoration:none;font-weight:500}
#zoneAuthor:hover{color:#fff;text-decoration:underline}
.zone-controls{display:flex;gap:.75rem}
.zone-controls button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.3);color:#fff;padding:.625rem 1rem;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:600;transition:all .3s ease;backdrop-filter:blur(20px);font-family:inherit}
.zone-controls button:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5);transform:translateY(-1px);box-shadow:var(--shadow)}
#zoneFrame{flex-grow:1;border:none;width:90%;height:90%}

#popupOverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:2000;padding:1rem;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.popup{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);width:100%;max-width:520px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border);animation:slideInScale .3s ease}
@keyframes slideInScale{from{transform:scale(.9) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.popup-header{background:var(--gradient-primary);color:#fff;padding:1.25rem 1.5rem;display:flex;justify-content:space-between;align-items:center}
#popupTitle{margin:0;font-size:1.25rem;font-weight:700}
#popupClose{background:rgba(255,255,255,.1);border:0;color:#fff;font-size:1.25rem;cursor:pointer;padding:.5rem;border-radius:var(--radius);line-height:1;width:36px;height:36px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(20px);transition:all .3s ease}
#popupClose:hover{background:rgba(255,255,255,.2);transform:scale(1.1)}
#popupBody{padding:1.5rem;overflow-y:auto;color:var(--text)}
#popupBody input[type="text"]{width:100%;padding:.875rem 1rem;margin-bottom:1.25rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-secondary);color:var(--text);font-size:15px;transition:all .3s ease;outline:none;font-family:inherit}
#popupBody input[type="text"]:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(168,85,247,.1);transform:translateY(-1px)}
.settings-button{background:var(--gradient-primary);color:#fff;border:0;padding:.875rem 1.5rem;font-size:15px;font-weight:600;border-radius:var(--radius);cursor:pointer;transition:all .3s ease;box-shadow:var(--shadow-sm);min-width:200px;width:100%;text-align:center;font-family:inherit}
.settings-button:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.info-button{background:none;border:none;cursor:pointer;padding:0;margin-left:10px;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;transition:background-color .2s,transform .2s;color:inherit;vertical-align:middle}
.info-button:hover{background-color:rgba(255,255,255,.1);transform:scale(1.1)}
.info-button svg{display:block}

@media(max-width:768px){
.search-bar-area{flex-direction:column;padding:0.75rem}
#container,#featuredZones{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1.25rem}
.zone-item button{padding:1rem .75rem;min-height:65px;font-size:13px}
main{padding:1rem .75rem 4rem}
}
@media(max-width:480px){
#container,#featuredZones{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem}
.popup{margin:.5rem}
.zone-item:hover{transform:translateY(-10px) scale(1.01)}
}
</style>
</head>
<body class="dark-mode">

<div class="search-bar-area">
  <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()">
  <button class="refresh-btn" onclick="listZones()" title="Refresh">&#x21bb;</button>
</div>

<main>

  <details id="allZonesWrapper" open>
    <summary id="allSummary" style="font-size:1.2rem;font-weight:bold;cursor:pointer">All Zones</summary>
    <div id="container">Loading...</div>
  </details>
</main>

<div id="zoneViewer">
  <div class="zone-header">
    <div class="zone-title">
      <h2 id="zoneName">zone</h2>
      <button class="info-button" onclick="showZoneInfo()" title="Zone Information">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
      </button>
      <span id="zoneId" style="display:none"></span>
      <a id="zoneAuthor" href="#" target="_blank">by Author</a>
    </div>
    <div class="zone-controls">
      <button onclick="fullscreenZone()">Fullscreen</button>
      <button onclick="aboutBlank()">Open in New Tab</button>
      <button onclick="downloadZone()">Download</button>
      <button onclick="closeZone()">Close</button>
    </div>
  </div>
  <iframe id="zoneFrame"></iframe>
</div>

<div id="popupOverlay">
  <div class="popup">
    <div class="popup-header">
      <h3 id="popupTitle">Title</h3>
      <button id="popupClose" onclick="closePopup()">×</button>
    </div>
    <div id="popupBody">Content will be here</div>
  </div>
</div>

<script>
const container = document.getElementById('container');
const zoneViewer = document.getElementById('zoneViewer');
let zoneFrame = document.getElementById('zoneFrame');
const searchBar = document.getElementById('searchBar');
const zonesurls = [
    "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets@main/zones.json",
    "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets@latest/zones.json",
    "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets@master/zones.json",
    "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets/zones.json"
];
let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
const coverURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/html@main";
let zones = [];
let popularityData = {};

function toTitleCase(str) {
  return str.replace(/\w\S*/g, text => text.charAt(0).toUpperCase() + text.substring(1).toLowerCase());
}
async function listZones() {
    try {
      let sharesponse, shajson, sha;
      try { sharesponse = await fetch("https://api.github.com/repos/%67%6e%2d%6d%61%74%68/assets/commits?t="+Date.now()); } catch(e) {}
      if (sharesponse && sharesponse.status === 200) {
        try {
          shajson = await sharesponse.json();
          sha = shajson[0]['sha'];
          if (sha) zonesURL = `https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets@${sha}/zones.json`;
        } catch(e) {
          try {
            let sr = await fetch("https://raw.githubusercontent.com/%67%6e%2d%6d%61%74%68/xml/refs/heads/main/sha.txt?t="+Date.now());
            if (sr && sr.status === 200) { sha = (await sr.text()).trim(); if (sha) zonesURL = `https://cdn.jsdelivr.net/gh/%67%6e%2d%6d%61%74%68/assets@${sha}/zones.json`; }
          } catch(e2) {}
        }
      }
      const response = await fetch(zonesURL+"?t="+Date.now());
      const json = await response.json();
      zones = json;
      await Promise.all([fetchPopularity("year"), fetchPopularity("month"), fetchPopularity("week"), fetchPopularity("day")]);
      sortZones();
      try {
        const search = new URLSearchParams(window.location.search);
        const id = search.get('id');
        const embed = window.location.hash.includes("embed");
        if (id) {
          const zone = zones.find(z => z.id + '' == id + '');
          if (zone) { if (!embed) openZone(zone); }
        }
      } catch(e) {}

    } catch (error) { console.error(error); container.innerHTML = `Error loading zones: ${error}`; }
}
async function fetchPopularity(duration) {
    try {
      if (!popularityData[duration]) popularityData[duration] = {};
      const response = await fetch("https://data.jsdelivr.com/v1/stats/packages/gh/%67%6e%2d%6d%61%74%68/html@main/files?period=" + duration);
      const data = await response.json();
      data.forEach(file => { const m = file.name.match(/\/(\d+)\.html$/); if (m) popularityData[duration][parseInt(m[1])] = file.hits?.total ?? 0; });
    } catch(e) { if (!popularityData[duration]) popularityData[duration] = {}; popularityData[duration][0] = 0; }
}
function sortZones() {
    zones.sort((a,b) => a.name.localeCompare(b.name));
    zones.sort((a,b) => (a.id === -1 ? -1 : b.id === -1 ? 1 : 0));
    displayZones(zones);
}

function displayZones(list) {
    container.innerHTML = "";
    list.forEach(file => { mkCard(file, container); });
    if (container.innerHTML === "") container.innerHTML = "No zones found.";
    else document.getElementById("allSummary").textContent = `All Zones (${list.length})`;
    lazyLoad('img.lazy-zone-img');
}
function mkCard(file, parent) {
    const d = document.createElement("div"); d.className = "zone-item"; d.onclick = () => openZone(file);
    const img = document.createElement("img"); img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL); img.alt = file.name; img.loading = "lazy"; img.className = "lazy-zone-img";
    d.appendChild(img);
    const btn = document.createElement("button"); btn.textContent = file.name; btn.onclick = e => { e.stopPropagation(); openZone(file); };
    d.appendChild(btn); parent.appendChild(d);
}
function lazyLoad(sel) {
    const obs = new IntersectionObserver((entries,o) => { entries.forEach(e => { if (e.isIntersecting && !zoneViewer.hidden) { e.target.src = e.target.dataset.src; e.target.classList.remove("lazy-zone-img"); o.unobserve(e.target); } }); }, {rootMargin:"100px",threshold:0.1});
    document.querySelectorAll(sel).forEach(img => obs.observe(img));
}
function filterZones() {
    const q = searchBar.value.toLowerCase();
    if (q.length === 0) { displayZones(zones); return; }
    displayZones(zones.filter(z => z.name.toLowerCase().includes(q)));
}
function openZone(file) {
    if (file.url.startsWith("http")) { window.open(file.url, "_blank"); return; }
    const url = file.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    fetch(url+"?t="+Date.now()).then(r => r.text()).then(html => {
        if (zoneFrame.contentDocument === null) { zoneFrame = document.createElement("iframe"); zoneFrame.id = "zoneFrame"; zoneViewer.appendChild(zoneFrame); }
        zoneFrame.contentDocument.open(); zoneFrame.contentDocument.write(html); zoneFrame.contentDocument.close();
        document.getElementById('zoneName').textContent = file.name;
        document.getElementById('zoneId').textContent = file.id;
        document.getElementById('zoneAuthor').textContent = "by " + file.author;
        if (file.authorLink) document.getElementById('zoneAuthor').href = file.authorLink;
        zoneViewer.style.display = "block";
        try { const u = new URL(window.location); u.searchParams.set('id', file.id); history.pushState(null, '', u.toString()); } catch(e) {}
        zoneViewer.hidden = true;
    }).catch(e => alert("Failed to load zone: " + e));
}
function aboutBlank() {
    const w = window.open("about:blank", "_blank");
    let z = zones.find(z => z.id + '' === document.getElementById('zoneId').textContent).url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
    fetch(z+"?t="+Date.now()).then(r => r.text()).then(html => { if (w) { w.document.open(); w.document.write(html); w.document.close(); } });
}
function closeZone() {
    zoneViewer.hidden = false; zoneViewer.style.display = "none"; zoneViewer.removeChild(zoneFrame);
    try { const u = new URL(window.location); u.searchParams.delete('id'); history.pushState(null, '', u.toString()); } catch(e) {}
}
function downloadZone() {
    let z = zones.find(z => z.id + '' === document.getElementById('zoneId').textContent);
    fetch(z.url.replace("{HTML_URL}", htmlURL)+"?t="+Date.now()).then(r => r.text()).then(text => {
        const b = new Blob([text], {type:"text/plain;charset=utf-8"}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = z.name + ".html"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u);
    });
}
function fullscreenZone() {
    if (zoneFrame.requestFullscreen) zoneFrame.requestFullscreen();
    else if (zoneFrame.mozRequestFullScreen) zoneFrame.mozRequestFullScreen();
    else if (zoneFrame.webkitRequestFullscreen) zoneFrame.webkitRequestFullscreen();
}
function showZoneInfo() {
    let id = Number(document.getElementById('zoneId').textContent);
    document.getElementById('popupTitle').textContent = "Info";
    const pb = document.getElementById('popupBody'); pb.innerHTML = `<p>Loading...</p>`; pb.contentEditable = false;
    document.getElementById('popupOverlay').style.display = "flex";
    fetch(`https://api.github.com/repos/%67%6e%2d%6d%61%74%68/html/commits?path=${id}.html`).then(r => r.json()).then(async json => {
        let stats = await getStats(id); let ij = zones.filter(a => a.id === id)[0];
        document.getElementById('popupTitle').textContent = `${ij.name} Info`;
        const d = new Date(json.at(-1).commit.author.date);
        let fd = new Intl.DateTimeFormat("en-US",{month:"long",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit",hour12:true}).format(d);
        pb.innerHTML = `<p><b>Id</b>: ${id}<br><b>Name</b>: ${ij.name}<br>${ij.author?`<b>Game Author</b>: ${ij.author}<br>`:""}${ij.authorLink?`<b>Game Author Link</b>: <a style="color:#FFFF00" href="${ij.authorLink}">${ij.authorLink}</a><br>`:""}${ij.special?`<b>Tags</b>: ${ij.special}<br>`:""}<b>Adder</b>: ${json.at(-1).commit.author.name}<br><b>Date Added</b>: ${fd}<br><b>Times Played</b>: ${Number(stats).toLocaleString("en-US")}</p>`;
    });
}
function closePopup() { document.getElementById('popupOverlay').style.display = "none"; }
let _allStatsCache = null;
async function getAllStats() {
    if (_allStatsCache) return _allStatsCache;
    const BASE = "https://data.jsdelivr.com/v1/stats/packages/gh/%67%6e%2d%6d%61%74%68/html@main/files";
    let page = 1, done = false, map = Object.create(null);
    while (!done) {
        const pages = Array.from({length:5},(_,i) => page+i);
        const res = await Promise.all(pages.map(p => fetch(`${BASE}?period=year&page=${p}&limit=100`).then(r => r.ok ? r.json() : [])));
        for (const data of res) { if (!Array.isArray(data) || data.length === 0) { done = true; break; } for (const item of data) { if (!item?.name) continue; const m = item.name.match(/^\/(\d+)([.-])/); if (!m) continue; const id = m[1]; if (!map[id]) map[id] = {hits:0}; map[id].hits += item.hits?.total ?? 0; } }
        page += 5;
    }
    _allStatsCache = map; return map;
}
async function getStats(id) { return (await getAllStats())[String(id)]?.hits ?? 0; }
function tabCloak() {
    closePopup();
    document.getElementById('popupTitle').textContent = "Tab Cloak";
    const pb = document.getElementById('popupBody');
    pb.innerHTML = `<label style="font-weight:bold">Set Tab Title:</label><br><input type="text" placeholder="Enter new tab name..." oninput="document.title=this.value||'Games 3'"><br><br><br><label style="font-weight:bold">Set Tab Icon:</label><br><input type="text" placeholder="Enter icon url..." oninput="document.querySelector('link[rel~=&quot;icon&quot;]').href=this.value">`;
    pb.contentEditable = false; document.getElementById('popupOverlay').style.display = "flex";
}
listZones();
HTMLCanvasElement.prototype.toDataURL = function() { return ""; };
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'theme') {
    if (e.data.theme === 'light') {
      document.body.classList.remove('dark-mode');
    } else {
      document.body.classList.add('dark-mode');
    }
  }
});
</script>
</body>
</html>
